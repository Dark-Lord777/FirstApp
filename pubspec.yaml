name: wheel_of_fortune
description: "Wheel of Fortune - customizable wheel app"
publish_to: 'none'

version: 1.0.1+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  flutter_fortune_wheel: ^1.3.2
  
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  
  http: ^1.3.0
  
  bee_dynamic_launcher:
    path: plugins/bee_dynamic_launcher-1.1.0
  
  background_fetch: ^1.3.4 

  bot_toast: ^4.1.3
  url_launcher: ^6.3.2
  share_plus: ^13.1.0
  flutter_local_notifications: ^22.0.1
  firebase_messaging: ^16.4.1
  uuid: ^4.5.3
  device_info_plus: ^13.1.0
  firebase_core: ^4.11.0
  simple_icons: ^16.23.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  assets:
    - assets/bee_dynamic_launcher/catalog.json
    - assets/bee_dynamic_launcher/icons/

  uses-material-design: true

bee_dynamic_launcher:
  images_dir: "assets/bee_dynamic_launcher/icons"
  catalog:
    - id: "default"
      image_path: "ic_default.png"
      label: "Wheel of Fortune"
    - id: "pink"
      image_path: "ic_pink.png"
      label: "Wheel of Fortune"

    - id: "777"
      image_path: "ic_777.png"
      label: "Wheel of Fortune"

      

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    background_color: "#ffffff"
    theme_color: "#000000"
  linux:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
