name: wheel_of_fortune
description: "Wheel of Fortune - customizable wheel app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  flutter_fortune_wheel: ^1.3.2
  
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  
  http: ^1.1.0
  
  bee_dynamic_launcher: ^1.1.0
  
  background_fetch: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  dart_code_metrics: ^4.12.0

flutter:
  assets:
    - assets/certificates/server.crt
    - assets/bee_dynamic_launcher/catalog.json
    - assets/bee_dynamic_launcher/icons/

  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    background_color: "#ffffff"
    theme_color: "#000000"
  linux:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
