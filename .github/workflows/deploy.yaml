name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build web
        run: flutter build web --release
      
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
      
      - name: Clean old deployments (keep only last 2)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ids=($(gh api repos/${{ github.repository }}/deployments --paginate --jq 'sort_by(.created_at) | .[].id'))
          total=${#ids[@]}
          if [ $total -gt 2 ]; then
            for i in $(seq 0 $(($total - 3))); do
              gh api -X DELETE repos/${{ github.repository }}/deployments/${ids[$i]} --silent
            done
          fi
