name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  deployments: write  # ВАЖНО: нужно для удаления деплойментов

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      # Тут ваша сборка (npm install, npm run build и т.д.)
      - name: Build
        run: |
          npm install
          npm run build
      
      # Деплой на GitHub Pages (например, через peaceiris)
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
      
      # ОЧИСТКА СТАРЫХ ДЕПЛОЙМЕНТОВ
      - name: Clean old deployments (keep only last 2)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Получаем все ID деплойментов, сортируем от новых к старым
          deployment_ids=$(gh api repos/${{ github.repository }}/deployments --paginate --jq '.[].id')
          
          # Превращаем в массив
          ids=($deployment_ids)
          total=${#ids[@]}
          
          echo "Total deployments found: $total"
          
          # Если больше 2 — удаляем старые
          if [ $total -gt 2 ]; then
            # Проходим по всем, начиная с третьего (индекс 2)
            for i in $(seq 2 $(($total - 1))); do
              id=${ids[$i]}
              echo "Deleting deployment ID: $id"
              gh api -X DELETE repos/${{ github.repository }}/deployments/$id --silent
            done
            echo "Deleted $(($total - 2)) old deployments"
          else
            echo "Only $total deployments, nothing to clean"
          fi
